
name: Build Geode Mod
 
on:
 push:
   branches: [ main ]
 workflow_dispatch:
 
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
 
     - name: Setup Geode SDK
       uses: geode-sdk/build-geode-mod@main
       with:
         sdk: nightly
         target: android64
         export-pdb: false
 
     - name: Upload .geode file
       uses: actions/upload-artifact@v4
       with:
         name: FPSChanger
         path: build/*.geode
