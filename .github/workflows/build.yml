name: Build iOS Mod

on:
  workflow_dispatch: # Erlaubt es dir, den Build manuell zu starten
  push:
    branches:
      - main
      - master # Deckt beide gängigen Namen für den Haupt-Branch ab

jobs:
  build:
    name: Build iOS Artifact
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          # Wir bauen nur für iOS, da du es auf dem iPad willst
          platform: ios
          # Falls du externe Libraries nutzt, auf true setzen, sonst false
          bindings-checkout: false

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-ios-mod
          path: build/*.geode
