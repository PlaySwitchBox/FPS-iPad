name: Build iOS Mod

on:
  workflow_dispatch: # Erlaubt manuellen Start
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build iOS Artifact
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          # 'platform' existiert nicht, wir nutzen 'target'
          # 'target' ist laut Fehlermeldung ein gültiger Input
          target: ios 
          # 'bindings-checkout' wurde entfernt, da es ein ungültiger Input war

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-ios-mod
          path: build/*.geode
